<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matheus</title>
    <link rel="stylesheet" href="style.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.1.0/css/all.min.css">
</head>
<body>

<canvas id="constellation-canvas"></canvas> 

<nav>
  <div class="nav-container">
    <button class="tab-btn active" onclick="openTab('home')" data-i18n="nav.home">Home</button>
    <button class="tab-btn" onclick="openTab('games')" data-i18n="nav.games">Games</button>
    <button class="tab-btn" onclick="openTab('books')" data-i18n="nav.books">Books</button>
    <button class="tab-btn" onclick="openTab('movies')" data-i18n="nav.movies">Movies</button>
  </div>
</nav>
<div id="home" class="tab-content active">
  <div class="profile-section">
    <img src="Assets/profile.jpg" alt="Me" class="profile-pic">
    <div class="bio">
      <h1 data-i18n="home.hello">Matheus</h1>
      <p data-i18n="home.bio">I study engineering</p>
    </div>
  </div>
</div>

<div id="games" class="tab-content">
  <div id="game-grid" class="grid-container">
    <p data-i18n="common.loading">Loading games...</p>
  </div>
</div>

<div id="books" class="tab-content">
  <h2 data-i18n="books.title">Reading List</h2>
  <div id="book-grid" class="grid-container compact">
    <p data-i18n="common.loading">Loading books...</p>
  </div>
</div>

<div id="movies" class="tab-content">
  <h2 data-i18n="movies.title">Watch List</h2>
  <div id="movie-grid" class="grid-container compact">
    <p data-i18n="common.loading">Loading movies...</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
