<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pong</title>
	<link rel="icon" href="data:;base64,=">
	<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { 
      margin: 0; 
      background-color: #111;
      overflow: hidden;
      height: 100vh;
    }
    canvas.emscripten { 
      border: 0px none; 
      background-color: black;
      display: block;
			outline: none;

      image-rendering: pixelated;
      image-rendering: crisp-edges;

			position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
	<canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <script type='text/javascript'>
    var Engine = { 
		  canvas: (function() {
      	return document.getElementById('canvas');
      })(),

      print: (function() {
        return function(text) {
        	if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
		  		console.log(text);
        };
      })(),

      printErr: (function() {
        return function(text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      	};
      })(),
        
      postRun: [function() {
        document.getElementById('canvas').focus();
      }]
    };

		var keyMap = {
			"KeyA": 1, "KeyB": 2, "KeyC": 3, "KeyD": 4, "KeyE": 5,
			"KeyF": 6, "KeyG": 7, "KeyH": 8, "KeyI": 9, "KeyJ": 10,
			"KeyK": 11, "KeyL": 12, "KeyM": 13, "KeyN": 14,
			"KeyO": 15, "KeyP": 16, "KeyQ": 17, "KeyR": 18,
			"KeyS": 19, "KeyT": 20, "KeyU": 21, "KeyV": 22,
			"KeyW": 23, "KeyX": 24, "KeyY": 25, "KeyZ": 26,
			"Digit0": 27, "Digit1": 28, "Digit2": 29, "Digit3": 30,
			"Digit4": 31, "Digit5": 32, "Digit6": 33, "Digit7": 34,
			"Digit8": 35, "Digit9": 36,
			"Numpad0": 27, "Numpad1": 28, "Numpad2": 29, "Numpad3": 30,
			"Numpad4": 31, "Numpad5": 32, "Numpad6": 33, "Numpad7": 34,
			"Numpad8": 35, "Numpad9": 36,
			"Space": 37, "Enter": 38, "Escape": 39, "Backspace": 40,
      "Tab": 41, "ShiftLeft": 42, "ShiftRight": 42,
      "ControlLeft": 43, "ControlRight": 43,
      "AltLeft": 44, "AltRight": 44,
      "ArrowUp": 45, "ArrowDown": 46,
      "ArrowLeft": 47, "ArrowRight": 48
		};

		window.addEventListener('keydown', function(e) {
    	var keyId = keyMap[e.code] || 0; // 0 = None
    	if (keyId > 0) Engine['_JSOnKeyDown'](keyId);
		});

		window.addEventListener('keyup', function(e) {
    	var keyId = keyMap[e.code] || 0;
    	if (keyId > 0) Engine['_JSOnKeyUp'](keyId);
		});

	var Network = {
    peer: null,
    connection: null,
  
    initHost: function(hostId) {
      console.log("[Host] Starting Host with ID:", hostId);
      this.peer = new Peer(hostId);
      
      this.peer.on('open', (id) => {
        console.log("[Host] Registered on PeerJS server! ID:", id);
      });
  
      this.peer.on('connection', (conn) => {
        console.log("[Host] Incoming connection from client!");
        this.setupConnection(conn);
      });
  
      this.peer.on('error', (err) => {
        console.error("[Host] PeerJS Error:", err);
      });
    },
  
    initClient: function(hostId) {
      console.log("[Client] Starting Client, connecting to:", hostId);
      this.peer = new Peer();
      
      this.peer.on('open', (id) => {
        console.log("[Client] Registered on server. My ID:", id);
        const conn = this.peer.connect(hostId);
        this.setupConnection(conn);
      });
  
      this.peer.on('error', (err) => {
        console.error("[Client] PeerJS Error:", err);
      });
    },
  
    setupConnection: function(conn) {
      this.connection = conn;
  
      const onOpen = () => {
        console.log("[Network] WebRTC Data Channel OPEN AND READY!");
        if (Engine._OnPeerConnected) {
          Engine._OnPeerConnected();
        } else {
          console.error("Error: Engine._OnPeerConnected not found.");
        }
      };
  
      if (this.connection.open) {
        onOpen();
      } else {
        this.connection.on('open', onOpen);
      }
  
      this.connection.on('data', (data) => {
        const view = new Uint8Array(data);
        const size = view.length;
        
        const ptr = Engine._malloc(size);
        Engine.HEAPU8.set(view, ptr);
        
        if (Engine._OnNetworkPacket) {
           Engine._OnNetworkPacket(ptr, size);
        }
        Engine._free(ptr);
      });
  
		  this.connection.on('error', (err) => {
        console.error("[Network] Connection Error:", err);
        if (Engine._OnPeerDisconnected) Engine._OnPeerDisconnected();
      });

      this.connection.on('close', () => {
        console.log("[Network] Connection Closed by Peer");
        if (Engine._OnPeerDisconnected) Engine._OnPeerDisconnected();
      });

    },
  
    sendPacket: function(ptr, size) {
      if (this.connection && this.connection.open) {
        const wasmView = new Uint8Array(Engine.HEAPU8.buffer, ptr, size);
        const safePacket = new Uint8Array(wasmView); 
        this.connection.send(safePacket.buffer);
      }
    }
  };
  </script>
    {{{ SCRIPT }}}
</body>
</html>
